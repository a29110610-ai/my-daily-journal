name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # دانلود نسخه فوق‌العاده پایدار و رسمی گریدل ۸.۴ به روشی که ارور شبکه ندهد
    - name: Setup Gradle 8.4
      run: |
        rm -rf gradle/wrapper
        rm -f gradlew
        rm -f gradlew.bat
        wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip
        sudo unzip -q gradle-8.4-bin.zip -d /opt
        echo "/opt/gradle-8.4/bin" >> $GITHUB_PATH

    - name: Create Debug Keystore
      run: |
        mkdir -p $HOME/.android
        keytool -genkey -v -keystore $HOME/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        cp $HOME/.android/debug.keystore ./app/debug.keystore || true

    # اجرای ساخت با نسخه دقیق و ترفند پردازش کد داخلی کاتلین
    - name: Build with Gradle
      run: gradle assembleDebug --no-daemon -Dkotlin.compiler.execution.strategy=in-process

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        
