name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # این گام کل پوشه خراب گریدل قبلی را پاک کرده و نسخه پیش‌فرض و هماهنگ خود سیستم اوبونتو را فعال می‌کند
    - name: Clear corrupt wrapper and setup local Gradle
      run: |
        rm -rf gradle/wrapper
        rm -f gradlew
        rm -f gradlew.bat
        sudo apt-get update && sudo apt-get install -y gradle

    - name: Create Debug Keystore
      run: |
        mkdir -p $HOME/.android
        keytool -genkey -v -keystore $HOME/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        cp $HOME/.android/debug.keystore ./app/debug.keystore || true

    # اجرای کامپایل با گریدل محلی سرور و ترفند حل مشکل KSP
    - name: Build with Gradle
      run: gradle assembleDebug --no-daemon -Dkotlin.compiler.execution.strategy=in-process

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        
